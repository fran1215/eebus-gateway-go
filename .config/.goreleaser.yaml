version: 2
project_name: eebus-gateway-go

# before:
#   hooks:
#     - go mod tidy
builds:
  - dir: "./src"
    main: ./cmd/main.go
    binary: eebus-gateway-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  disable: true

source:
  enabled: false

release:
  github:
    owner: fran1215
    name: eebus-gateway-go
